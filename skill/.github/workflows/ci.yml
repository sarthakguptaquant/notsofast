name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Validate plugin manifests are well-formed JSON
        run: |
          python -c "import json; json.load(open('.claude-plugin/marketplace.json')); json.load(open('.claude-plugin/plugin.json')); print('manifests ok')"
      - name: Run the guard test suite
        working-directory: skills/third-umpire/scripts
        run: python test_third_umpire.py
      - name: Run the worked example
        working-directory: skills/third-umpire/examples
        run: python quickstart.py
