<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1280 640"
  width="1280"
  height="640"
  role="img"
  aria-label="third-umpire: the independent review for an agentic loop's high-stakes calls, by Sarthak Gupta"
>
  <title>third-umpire: social preview</title>
  <desc>Social preview card for third-umpire, a verification skill for agentic AI loops. By Sarthak Gupta, Data Scientist II, Finance Models. Personal capacity.</desc>

  <!-- LAYER 0: Background -->
  <rect width="1280" height="640" fill="#0F0E0B"/>

  <!-- LAYER 1: Grid — 6 horizontal rules, quant-blue 14% opacity, 0.5px -->
  <g opacity="0.14" stroke="#1B3DFF" stroke-width="0.5" fill="none">
    <line x1="0" y1="80"  x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
  </g>

  <!-- LAYER 2: Left column, safe area x=80..900 -->

  <!-- Eyebrow: JetBrains Mono 12px, quant-blue, ALL CAPS, tracking 0.08em -->
  <text
    x="80"
    y="140"
    font-family="'JetBrains Mono', 'Courier New', Courier, monospace"
    font-size="12"
    font-weight="500"
    fill="#1B3DFF"
    letter-spacing="0.08em"
    text-anchor="start"
  >VERIFICATION SKILL · AGENTIC AI</text>

  <!-- Hero: "third-umpire" — Fraunces 72px, cream, weight 500, tracking -0.01em -->
  <!-- Width estimate: 12 chars × ~39px avg = ~468px; starts x=80, ends ~548; cursor at ~556 -->
  <!-- Well within x=860 boundary -->
  <text
    x="80"
    y="220"
    font-family="'Fraunces', Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="500"
    fill="#F4F1E8"
    letter-spacing="-0.01em"
    text-anchor="start"
  >third-umpire</text>

  <!-- Terminal cursor ▌ — JetBrains Mono ~68px, terminal-green -->
  <!-- x offset: 80 + estimated 12-char Fraunces 72px width ~468px + 8px gap = 556 -->
  <!-- y nudged from 220 to 225 so the block glyph baseline aligns with the Fraunces hero -->
  <text
    x="556"
    y="225"
    font-family="'JetBrains Mono', 'Courier New', Courier, monospace"
    font-size="68"
    font-weight="400"
    fill="#00B870"
    text-anchor="start"
  >&#x258C;</text>

  <!-- Tagline line 1: Geist 24px, cream 88% -->
  <!-- "The independent review for an agentic loop's" = 44 chars × ~13.2px = ~528px, fits in 820px -->
  <text
    x="80"
    y="268"
    font-family="'Geist', 'Inter', system-ui, -apple-system, sans-serif"
    font-size="24"
    font-weight="400"
    fill="#F4F1E8"
    opacity="0.88"
    text-anchor="start"
  >The independent review for an agentic loop&#x2019;s</text>

  <!-- Tagline line 2 -->
  <text
    x="80"
    y="304"
    font-family="'Geist', 'Inter', system-ui, -apple-system, sans-serif"
    font-size="24"
    font-weight="400"
    fill="#F4F1E8"
    opacity="0.88"
    text-anchor="start"
  >high-stakes calls.</text>

  <!-- Verdict row: y=380 -->
  <!-- Measure: dot(r5=10w) + 4gap + ALLOW(5×7.8=39) + 32gap + dot + 4gap + REQUIRE_INDEPENDENT_CHECK(25×7.8=195) + 32gap + dot + 4gap + ESCALATE(8×7.8=62) ≈ 396px; ends at x=476; within x=820 -->

  <!-- ALLOW — green -->
  <circle cx="91" cy="376" r="5" fill="#00B870"/>
  <text
    x="104"
    y="380"
    font-family="'JetBrains Mono', 'Courier New', Courier, monospace"
    font-size="13"
    font-weight="500"
    fill="#00B870"
    letter-spacing="0.07em"
    text-anchor="start"
  >ALLOW</text>

  <!-- REQUIRE_INDEPENDENT_CHECK — blue -->
  <!-- x start: 104 + 5×(13×0.6)=39 + tracking(5×0.07×13≈4.5) + 32gap = 179.5 ~ 180 -->
  <circle cx="191" cy="376" r="5" fill="#1B3DFF"/>
  <text
    x="204"
    y="380"
    font-family="'JetBrains Mono', 'Courier New', Courier, monospace"
    font-size="13"
    font-weight="500"
    fill="#1B3DFF"
    letter-spacing="0.07em"
    text-anchor="start"
  >REQUIRE_INDEPENDENT_CHECK</text>

  <!-- ESCALATE — cream 55% -->
  <!-- x start: 204 + 25×(13×0.6)=195 + tracking(25×0.07×13≈22.75) + 32gap ≈ 454 -->
  <circle cx="465" cy="376" r="5" fill="#F4F1E8" opacity="0.55"/>
  <text
    x="478"
    y="380"
    font-family="'JetBrains Mono', 'Courier New', Courier, monospace"
    font-size="13"
    font-weight="500"
    fill="#F4F1E8"
    opacity="0.55"
    letter-spacing="0.07em"
    text-anchor="start"
  >ESCALATE</text>

  <!-- LAYER 3: Right column — icon.svg paths scaled to 200×200, centered at x=1050 y=260 -->
  <!-- Icon viewBox="0 0 256 256", scaling to 200×200: scale=200/256≈0.78125 -->
  <!-- translate to position center at (1050,260): translate(1050-100, 260-100) = (950,160) -->
  <g transform="translate(950,160) scale(0.78125)">
    <!-- Rounded square background -->
    <rect x="0" y="0" width="256" height="256" rx="58" fill="#0F0E0B"/>
    <!-- Outer review frame -->
    <rect x="30" y="30" width="196" height="196" rx="38" fill="none" stroke="#1B3DFF" stroke-width="3" opacity="0.38"/>
    <!-- Incoming decision stub -->
    <line x1="52" y1="128" x2="86" y2="128" stroke="#F4F1E8" stroke-width="11" stroke-linecap="round" opacity="0.55"/>
    <!-- Three routed paths -->
    <g fill="none" stroke-width="11" stroke-linecap="round">
      <path d="M86 128 Q150 128 178 72"  stroke="#00B870"/>
      <path d="M86 128 L182 128"          stroke="#1B3DFF"/>
      <path d="M86 128 Q150 128 178 184" stroke="#F4F1E8" opacity="0.55"/>
    </g>
    <!-- Decision node -->
    <circle cx="86" cy="128" r="16" fill="#F4F1E8"/>
    <!-- Verdict endpoints: ALLOW (green), REQUIRE CHECK (blue), ESCALATE (cream 55%) -->
    <circle cx="182" cy="66"  r="17" fill="#00B870"/>
    <circle cx="194" cy="128" r="17" fill="#1B3DFF"/>
    <circle cx="182" cy="190" r="17" fill="#F4F1E8" opacity="0.55"/>
  </g>

  <!-- LAYER 4: Footer rule — 1px, quant-blue 60%, x=80..1200, y=560 -->
  <line
    x1="80" y1="560"
    x2="1200" y2="560"
    stroke="#1B3DFF"
    stroke-width="1"
    opacity="0.60"
  />

  <!-- Attribution stamp: right-aligned to x=1200, y=580 — JetBrains Mono 11px -->
  <!-- Line 1: SARTHAK GUPTA — terminal-green -->
  <text
    x="1200"
    y="580"
    font-family="'JetBrains Mono', 'Courier New', Courier, monospace"
    font-size="11"
    font-weight="500"
    fill="#00B870"
    letter-spacing="0.07em"
    text-anchor="end"
  >SARTHAK GUPTA</text>

  <!-- Line 2: DATA SCIENTIST II, FINANCE MODELS — cream 72% -->
  <text
    x="1200"
    y="596"
    font-family="'JetBrains Mono', 'Courier New', Courier, monospace"
    font-size="11"
    font-weight="500"
    fill="#F4F1E8"
    opacity="0.72"
    letter-spacing="0.07em"
    text-anchor="end"
  >DATA SCIENTIST II, FINANCE MODELS</text>

  <!-- Line 3: PERSONAL CAPACITY — cream 45% -->
  <text
    x="1200"
    y="611"
    font-family="'JetBrains Mono', 'Courier New', Courier, monospace"
    font-size="11"
    font-weight="500"
    fill="#F4F1E8"
    opacity="0.45"
    letter-spacing="0.07em"
    text-anchor="end"
  >PERSONAL CAPACITY</text>

</svg>
