<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SVG Preview</title>
<style>
body { background: #1a1a1a; margin: 0; padding: 40px; font-family: monospace; color: #fff; }
h2 { color: #888; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; margin: 0 0 8px; }
.card { margin-bottom: 60px; }
img, object { display: block; max-width: 100%; border: 1px solid #333; }
</style>
</head>
<body>
<div class="card">
  <h2>OG Card — 1280x640</h2>
  <img src="og-card.svg" width="1280" height="640" alt="og-card">
</div>
<div class="card">
  <h2>Flow Brand — 720x520</h2>
  <img src="flow-brand.svg" width="720" height="520" alt="flow-brand">
</div>
</body>
</html>
